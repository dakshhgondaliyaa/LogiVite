<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Clients | LogiBrisk</title>
    <meta name="description" content="View the trusted logistics brands and transporters that rely on LogiBrisk to run their daily operations.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css?v=2">
    <link rel="stylesheet" href="../css/hero.css">
    <link rel="stylesheet" href="../css/sections.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main>
        <!-- HERO -->
        <section class="hero hero--compact" style="position: relative; overflow: hidden; background-color: #f8fafc;">
            <div class="container hero__inner" style="position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-16); align-items: center;">
                <div class="hero__content reveal-up text-center mx-auto" style="max-width: 800px;">
                    <h1 class="hero__title">Trusted by industry leaders.</h1>
                    <p class="hero__subtitle">Over 360 transport and logistics companies across India rely on LogiBrisk to power their daily operations.</p>
                </div>
            </div>
        </section>

        <!-- STATS BAR -->
        <section class="section py-12" style="background-color: var(--bg-white); border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light);">
            <div class="container">
                <div class="grid grid--3 text-center reveal-up" style="gap: 2rem;">
                    <div style="padding: 2rem;">
                        <div class="font-mono js-counter" style="color: var(--blue-primary); font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.5rem; line-height: 1;" data-target="360" data-format="plus">0</div>
                        <div class="text-uppercase" style="color: var(--text-heading); font-size: 1rem; font-weight: 700; letter-spacing: 1px;">Enterprise Clients</div>
                    </div>
                    <div style="padding: 2rem;">
                        <div class="font-mono js-counter" style="color: var(--blue-primary); font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.5rem; line-height: 1;" data-target="50000" data-format="plus">0</div>
                        <div class="text-uppercase" style="color: var(--text-heading); font-size: 1rem; font-weight: 700; letter-spacing: 1px;">Vehicles Tracked</div>
                    </div>
                    <div style="padding: 2rem;">
                        <div class="font-mono js-counter" style="color: var(--blue-primary); font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.5rem; line-height: 1;" data-target="1.2" data-format="plus">0</div>
                        <div class="text-uppercase" style="color: var(--text-heading); font-size: 1rem; font-weight: 700; letter-spacing: 1px;">Million LRs Generated</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- CLIENTS GRID -->
        <section class="section section--light">
            <div class="container">
                <div class="section-header reveal-up text-center">
                    <h2 class="section-header__title">Our Partner Network</h2>
                </div>
                <div class="trust-bar__track animate-scroll-left" style="margin-top: 3rem;">
                    <div class="trust-bar__slide" style="display: flex; align-items: center; gap: 60px; padding-right: 60px;">
                        <img src="../images/real_logo_1.png" alt="SKE Group" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_2.png" alt="Azad Group" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_3.png" alt="SSG Logistics" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_4.png" alt="Ethics Group" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_5.png" alt="ARR" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_6.png" alt="Sidh Bhimeshwari" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_7.png" alt="Ethics Express" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_8.png" alt="Trustus" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                    </div>
                    <div class="trust-bar__slide" style="display: flex; align-items: center; gap: 60px; padding-right: 60px;">
                        <img src="../images/real_logo_1.png" alt="SKE Group" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_2.png" alt="Azad Group" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_3.png" alt="SSG Logistics" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_4.png" alt="Ethics Group" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_5.png" alt="ARR" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_6.png" alt="Sidh Bhimeshwari" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_7.png" alt="Ethics Express" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                        <img src="../images/real_logo_8.png" alt="Trustus" style="height: 50px; width: auto; object-fit: contain; opacity: 1;">
                    </div>
                </div>
            </div>
        </section>

        <!-- CTA -->
        <section class="cta-banner reveal-up">
            <div class="container cta-banner__content">
                <h2 class="cta-banner__title">Ready to join the leaders?</h2>
                <div class="cta-banner__actions mt-8">
                    <a href="../company/contact-us.html" class="btn btn--white btn--lg hover-lift">Get in Touch</a>
                </div>
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/main.js"></script>
    <script src="../js/counter.js"></script>

</body>
</html>
