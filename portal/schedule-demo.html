<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Demo | LogiBrisk</title>
    <meta name="description" content="Schedule a live demo of the LogiBrisk platform.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css?v=2">
    <link rel="stylesheet" href="../css/hero.css">
    <link rel="stylesheet" href="../css/sections.css">
    <link rel="stylesheet" href="../css/cards.css">
    <style>
        /* Embed Container */
        .calendar-embed-container {
            width: 100%;
            height: 800px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            background: #fff;
        }
        .calendar-embed-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main>
        <!-- HERO -->
        <section class="hero hero--compact hero--gradient">
            <div class="container hero__inner" style="text-align: center;">
                <h1 class="hero__title reveal-up">Schedule a Demo</h1>
                <p class="hero__subtitle reveal-up" style="animation-delay: 0.1s;">
                    Pick a time that works best for you to see LogiBrisk in action.
                </p>
            </div>
        </section>

        <!-- GOOGLE CALENDAR EMBED -->
        <section class="section section--light pt-0">
            <div class="container reveal-up" style="animation-delay: 0.2s;">
                <div class="calendar-embed-container" style="max-width: 1060px; margin: 0 auto;">
                    <!-- Note: If calendar.google.com refuses to connect due to X-Frame-Options, 
                         the user should embed their 'Public Booking Page' link instead of the /u/0/r/ link. -->
                    <iframe src="https://calendar.app.google/JEaZgAGK38csjtNF8" frameborder="0"></iframe>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/main.js"></script>

</body>
</html>
