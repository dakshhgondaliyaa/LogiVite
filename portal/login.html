<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | LogiVite</title>
    <meta name="description" content="Access the LogiVite client portal to manage your shipments and track cargo.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css?v=2">
    <link rel="stylesheet" href="../css/sections.css">
    
    <style>
        .login-bg {
            background-color: var(--bg-light-alt);
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 140px var(--space-4) var(--space-8);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 480px;
            padding: var(--space-10);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--cyan-accent), var(--blue-primary), var(--orange-cta));
        }

        .form-group {
            margin-bottom: var(--space-6);
        }

        .form-label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-body);
            margin-bottom: var(--space-2);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: var(--text-main);
            transition: all var(--transition-fast);
            background-color: var(--bg-white);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--blue-primary);
            box-shadow: 0 0 0 3px rgba(6, 24, 61, 0.1);
        }

        .login-icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: var(--radius-lg);
            background-color: var(--blue-light);
            color: var(--blue-primary);
            margin-bottom: var(--space-6);
        }
        
        .login-icon-wrap svg {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body class="login-bg">

    <div id="navbar-placeholder"></div>

    <main class="login-container">
        <div class="login-card reveal-up">
            <div class="text-center">
                <div class="login-icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-semibold mb-2">Access Control Hub</h1>
                <p class="text-muted mb-8">Enter your credentials to access the global logistics network.</p>
            </div>

            <form action="dashboard.html" method="GET" onsubmit="localStorage.setItem('logivite_user', document.getElementById('email').value.split('@')[0]);">
                <div class="form-group">
                    <label class="form-label" for="email">Operational ID / Email</label>
                    <input type="email" id="email" class="form-input" placeholder="user@logivite.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Passcode</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="flex--between mb-8">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--blue-primary);">
                        <span class="text-sm text-muted">Maintain session</span>
                    </label>
                    <a href="#" class="link text-sm">Recover Access</a>
                </div>

                <button type="submit" class="btn btn--primary" style="width: 100%;">
                    Initialize Session
                    <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/main.js"></script>

</body>
</html>
